# ansil16 palette: tokyo-night-day
# folke's Tokyo Night, Day variant (https://github.com/folke/tokyonight.nvim).
# Cool blue-lavender light bg. Upstream's terminal mapping has c9..c14 equal
# to c1..c6 — only c8 (terminal_black) and c15 (fg) differ from the standard
# row. Kept faithful to upstream.

bg = #E1E2E7
fg = #3760BF

# standard row
c0 = #D0D5E3
c1 = #F52A65
c2 = #587539
c3 = #8C6C3E
c4 = #2E7DE9
c5 = #9854F1
c6 = #007197
c7 = #6172B0

# bright row (c9..c14 mirror c1..c6 per upstream)
c8  = #A1A6C5
c9  = #F52A65
c10 = #587539
c11 = #8C6C3E
c12 = #2E7DE9
c13 = #9854F1
c14 = #007197
c15 = #3760BF
