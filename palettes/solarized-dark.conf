# ansil16 palette: solarized-dark
# Ethan Schoonover's Solarized (https://ethanschoonover.com/solarized/).
# Standard 16-color terminal mapping: the "bright" slots carry the
# base00/01/0/1/2/3 monotones plus orange and violet (which have no
# dedicated ANSI slots), so light and dark share the same 16 colors
# and only bg/fg flip.

bg = #002B36
fg = #839496

# standard row
c0 = #073642
c1 = #DC322F
c2 = #859900
c3 = #B58900
c4 = #268BD2
c5 = #D33682
c6 = #2AA198
c7 = #EEE8D5

# bright row (monotones + orange/violet)
c8  = #002B36
c9  = #CB4B16
c10 = #586E75
c11 = #657B83
c12 = #839496
c13 = #6C71C4
c14 = #93A1A1
c15 = #FDF6E3
