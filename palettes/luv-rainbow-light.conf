# ansil16 palette: luv-rainbow-light
# CIELUV-designed 16+2 palette for light backgrounds.
# Grayscale ramp is flipped (0=lightest, 15=darkest); bright row is darker
# variants of the standard row per the ambi16 theory.

bg = #FFFFFF
fg = #000000

# grayscale ramp (low→high contrast from bg)
c0  = #B9B9B9
c8  = #919191
c7  = #5E5E5E
c15 = #3B3B3B

# standard row
c1 = #D93668
c2 = #63810B
c3 = #B66027
c4 = #3279C5
c5 = #AF4FBE
c6 = #1D857B

# high-contrast row (darker/desaturated for light bg)
c9  = #A50445
c10 = #445A09
c11 = #82400F
c12 = #035493
c13 = #852693
c14 = #085D56
